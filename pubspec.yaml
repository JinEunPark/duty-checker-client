name: duty_checker
description: "당직 및 근무 일정 관리 Flutter 애플리케이션"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3

  cupertino_icons: ^1.0.8

  # 상태 관리
  flutter_riverpod: ^2.5.1

  # 네비게이션
  go_router: ^14.1.4

  # 네트워크
  dio: ^5.9.2
  retrofit: ^4.1.0

  # 데이터 모델
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 로컬 저장소
  shared_preferences: ^2.2.3

  # 국제화
  intl: ^0.19.0

  # 이미지
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2

  # UI
  dotted_border: ^2.1.0
  gap: ^3.0.1
  url_launcher: ^6.3.1
  riverpod_annotation: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # 코드 생성
  build_runner: ^2.4.13
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0
  riverpod_generator: ^2.3.9

  # 린트
  riverpod_lint: ^2.3.9
  custom_lint: ^0.6.4

  # 테스트
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.4

dependency_overrides:
  sqflite_darwin: ^2.4.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon_morse_1024.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icons/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
